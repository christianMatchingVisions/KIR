   3) Kasinokortit: lempea varjo + tasainen hover-nosto.

   --------------------------------------------------------------------- */
.casino-card,
.casino-list-item,
.casino-box,
.casino-review-card,
.toplist-item,
.casino-item {

  box-shadow: var(--kr-shadow-1);
  transition: box-shadow 0.25s var(--kr-ease),
              transform 0.25s var(--kr-ease);
  will-change: transform;
}

.casino-card:hover,
.casino-list-item:hover,
.casino-box:hover,
.casino-review-card:hover,
.toplist-item:hover,
.casino-item:hover {
  box-shadow: var(--kr-shadow-2);
  transform: translateY(-3px);
}

/* ---------------------------------------------------------------------
   4) Painikkeet: hienovarainen siirtyma + kevyt hover-nosto.
   Ei muuteta varia, kokoa eika tayttoa — vain varjo/transform/transition.
   --------------------------------------------------------------------- */
.wp-block-button__link,
.btn,
.button,
a.btn,
input[type="submit"],
button:not([disabled]) {
  transition: box-shadow 0.2s var(--kr-ease),
              transform 0.2s var(--kr-ease),
              filter 0.2s var(--kr-ease);
}

.wp-block-button__link:hover,
.btn:hover,
.button:hover,
a.btn:hover,
input[type="submit"]:hover,
button:not([disabled]):hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px var(--kr-accent-soft);
  filter: brightness(1.03);
}

.wp-block-button__link:active,
.btn:active,
.button:active,
a.btn:active,
input[type="submit"]:active,
button:not([disabled]):active {
  transform: translateY(0);
  box-shadow: var(--kr-shadow-1);
}

/* ---------------------------------------------------------------------
   5) Saavutettavuus: selkea focus-visible-rengas nappaimistokayttajille.
   !important yliajaa teemojen tavanomaisen outline:0 -nollauksen;
   :focus-visible ei nay hiiriklikkauksissa, joten ulkoasu ei karsi.
   --------------------------------------------------------------------- */
@supports selector(:focus-visible) {
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible,
  .wp-block-button__link:focus-visible,
  .btn:focus-visible,
  [tabindex]:focus-visible {
    outline: 3px solid var(--kr-accent) !important;
    outline-offset: 2px !important;
  }
}

/* ---------------------------------------------------------------------

   --------------------------------------------------------------------- */
.entry-content img:not([class*="logo"]):not([class*="icon"]),
article img:not([class*="logo"]):not([class*="icon"]) {
  border-radius: 8px;
}

/* ---------------------------------------------------------------------
   7) Liikeherkkyyden kunnioitus: poista nostot/siirtymat tarvittaessa.
   Vahva yliajo tahallaan, jotta animaatiot varmasti poistuvat.
   --------------------------------------------------------------------- */
@media (prefers-reduced-motion: reduce) {
  .casino-card,
  .casino-list-item,
  .casino-box,
  .casino-review-card,
  .toplist-item,
  .casino-item,
  .wp-block-button__link,
  .btn,
  .button,
  a.btn,
  input[type="submit"],
  button {
    transition: none !important;
    transform: none !important;
  }
}
